<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram - Elena und Michi</title>
    <link type="image/x-icon" rel="icon" href="./img/logo-fotogram.svg">
    <link type="text/css" rel="stylesheet" href="style.css">
    <script type="text/javascript" src="./photos.js"></script>
    
</head>
<body onload="initDisplayPhotoGallery()">
    <header class="PositionFixedHeader">
        <div class="PaddingLeftRight ContainerHeaderFooter">
            <a class="HeaderLinks" href="index.html">
                <img class="HeaderLogo"
                    src="./img/logo-fotogram.svg" 
                    alt="Fotogram Logo"/>
                Fotogram<br>Elena & Michi
            </a>
            <a class="HeaderLinks" href="#">
                <span class="HideMobile">Kontakt</span>
                <img class="LogosIcons" 
                    src="./img/icon-mail.svg" 
                    alt="E-Mail Symbol zur Kontaktaufnahme"/>
            </a>
        </div>
    </header>

    <!-- Warum schließt sich das Fenster, auch wenn ich auf den Header/Footer oder das Dialogfenster selbst klicke?? -->
    <main>
        <div class="ContentLimitation ContainerH1">
            <h1 class="HideMobile PaddingLeftRight">Elenas & Michis Reisefotos</h1>
            <h1 class="ShowMobile PaddingLeftRight">Reisefotos</h1>
        </div>
        <div class="PaddingLeftRight ContentLimitation MainContainerPhotoGallery">
            <section class="SectionPhotoGallery">
                <h2>Elba</h2>
                <!-- Container-id must be identical to foldername AND key in photos.js-file !! -->
                <div class="ImageContainerPhotoGallery"
                    id="elba">
                </div>
            </section>
            <section class="SectionPhotoGallery">
                <h2>Neuseeland und Fiji</h2>
                <!-- Container-id must be identical to foldername AND key in photos.js-file !! -->
                <div class="ImageContainerPhotoGallery"
                    id="nz-fiji">
                </div>
            </section>
            <section class="SectionPhotoGallery">
                <h2>USA und Hawaii</h2>
                <!-- Container-id must be identical to foldername AND key in photos.js-file !! -->
                <div class="ImageContainerPhotoGallery"
                    id="usa-hawaii">
                </div>
            </section>
            <section class="SectionPhotoGallery">
                <h2>Weitere Orte</h2>
                <!-- Container-id must be identical to foldername AND key in photos.js-file !! -->
                <div class="ImageContainerPhotoGallery"
                    id="other">
                </div>
            </section>
        </div>

        <dialog closedby="any" id="#DialogPhotoOverlay">
            <div class="ContainerDialog"
                id="#PhotoOverlay">
            </div>
        </dialog>
    </main>

    <footer class="PositionFixedFooter">
        <div class="PaddingLeftRight ContainerHeaderFooter">
            <div class="ChildContainerFooter">
                <span>Fotos:</span>
                <span class="HideMobile">&#169 M. & E. Hiener</span>
                <span class="ShowMobile">&#169 M. & E. H.</span>
            </div>
            <div>
                <a target="_blank" href="https://github.com/ElenaH-2026">
                    <img class="MobileLogosIcons LogosIcons" 
                        src="./img/logo-github-invertocat-white.svg" 
                        alt="GitHub Logo"/>
                </a>
                <a class="HideMobile" href="#">
                    <img class="LogosIcons" 
                        src="./img/icon-mail.svg" 
                        alt="E-Mail Symbol zur Kontaktaufnahme"/>
                </a>
                <a target="_blank" href="https://de.linkedin.com/in/elena-hiener">
                    <img class="MobileLogosIcons LogosIcons" 
                        src="./img/logo-linkedin-white.png" 
                        alt="LinkedIn Logo"/>
                </a>
            </div>
            <div class="ChildContainerFooter">
                <a href="./impressum.html">Impressum</a>
                <span class="HideMobile">&#8226</span>
                <a class="HideMobile" href="./datenschutz.html">Datenschutz</a>
            </div>
        </div>
    </footer>

    <script type="text/javascript" src="./script.js"></script>
</body>
</html>
